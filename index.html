<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Quintals League</title><style>

body { font-family: Arial; background:#0b0f2a; color:white; margin:0; }

header { background: linear-gradient(135deg,#0f172a,#1e3a8a); text-align:center; padding:20px 10px; }

header h1 { margin:0; font-size:26px; letter-spacing:2px; background: linear-gradient(90deg,#3b82f6,#22c55e); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

header img { width:120px; margin-top:10px; border-radius:10px; }

.container { padding:10px; }

input, button { width:100%; padding:14px; margin:6px 0; border-radius:10px; border:none; }
button { background:#2563eb; color:white; font-weight:bold; }

/* tabela */
table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { padding:8px; border-top:1px solid #1f2937; }
th { color:#9ca3af; }
tr { background:#111827; }
.top { border-left:4px solid #3b82f6; }

/* jogos */
.jogo {
display:grid;
grid-template-columns: 1fr auto 1fr;
align-items:center;
background:#1e293b;
padding:10px;
margin:6px 0;
border-radius:10px;
gap:8px;
}
.time { text-align:center; font-size:13px; }
.placar { display:flex; gap:5px; align-items:center; }
.placar input { width:40px; height:35px; text-align:center; }

/* 🔥 CHAVE ESTILO CHAMPIONS */
.chave {
  display:flex;
  justify-content:space-between;
  margin-top:20px;
  gap:20px;
}

.coluna {
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.coluna h3 {
  text-align:center;
  color:#9ca3af;
}

.duelo {
  background:#0f172a;
  padding:12px;
  border-radius:14px;
  margin-bottom:20px;
  box-shadow:0 0 15px rgba(0,0,0,0.6);
  border:1px solid #1e3a8a;
}

.final {
  align-items:center;
}

</style></head><body>

<header>
<h1>🏆 UEFA QUINTALS LEAGUE</h1>
<img src="Champions-League-com-novo-formato-comeca-hoje.-Confira-os-jogos.jpg">
</header>

<div class="container">

<input id="novoTime" placeholder="Digite um time">
<button onclick="adicionarTime()">Adicionar Time</button>
<button onclick="finalizarLiga()">Finalizar Liga</button>

<table id="tabela">
<thead>
<tr>
<th>Pos</th><th>Time</th><th>P</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>SG</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2>Jogos</h2>
<div id="jogos"></div>

<h2>Mata-mata</h2>
<div id="mata"></div>
  
<button onclick="forcarFinal()" style="margin-top:10px; background:#22c55e;">
Finalizar Semifinais
</button>

</div>

<script>

let times=[];
let tabela={};

document.getElementById("novoTime").addEventListener("keypress", e=>{
 if(e.key==="Enter") adicionarTime();
});

function adicionarTime(){
 let nome=document.getElementById("novoTime").value.trim();
 if(!nome) return;

 if(times.includes(nome)) return;

 times.push(nome);
 tabela[nome]={pts:0,v:0,e:0,d:0,gp:0,gc:0,j:0};
 document.getElementById("novoTime").value="";

 gerarJogos();
 atualizar();
}

function gerarJogos(){
 let div=document.getElementById("jogos");
 div.innerHTML="";
 if(times.length<2) return;

 let lista=[...times];
 if(lista.length%2) lista.push("BYE");
 let n=lista.length;
 let arr=lista.slice();

 for(let r=0;r<n-1;r++){
  div.innerHTML+=`<h3 style="color:#9ca3af">Rodada ${r+1}</h3>`;

  for(let i=0;i<n/2;i++){
   let t1=arr[i];
   let t2=arr[n-1-i];

   if(t1!=="BYE" && t2!=="BYE"){
    div.innerHTML+=`
    <div class="jogo">
      <div class="time">${t1}</div>
      <div class="placar">
        <input type="number" min="0" oninput="atualizar()">
        <span>x</span>
        <input type="number" min="0" oninput="atualizar()">
      </div>
      <div class="time">${t2}</div>
    </div>`;
   }
  }

  arr.splice(1,0,arr.pop());
 }
}

function atualizar(){
 for(let t of times){
  tabela[t]={pts:0,v:0,e:0,d:0,gp:0,gc:0,j:0};
 }

 let jogos=document.querySelectorAll('.jogo');

 jogos.forEach(j=>{
  let t1=j.children[0].innerText;
  let t2=j.children[2].innerText;

  if(!tabela[t1] || !tabela[t2]) return;

  let g1=parseInt(j.children[1].children[0].value);
  let g2=parseInt(j.children[1].children[2].value);

  if(isNaN(g1)||isNaN(g2)) return;

  tabela[t1].gp+=g1; tabela[t1].gc+=g2;
  tabela[t2].gp+=g2; tabela[t2].gc+=g1;

  tabela[t1].j++; tabela[t2].j++;

  if(g1>g2){ tabela[t1].pts+=3; tabela[t1].v++; tabela[t2].d++; }
  else if(g2>g1){ tabela[t2].pts+=3; tabela[t2].v++; tabela[t1].d++; }
  else{ tabela[t1].pts++; tabela[t2].pts++; tabela[t1].e++; tabela[t2].e++; }
 });

 let lista=Object.keys(tabela).map(t=>({
  time:t,
  ...tabela[t],
  sg:tabela[t].gp-tabela[t].gc
 }));

 lista.sort((a,b)=>b.pts-a.pts||b.sg-a.sg||b.gp-a.gp);

 let tbody=document.querySelector("#tabela tbody");
 tbody.innerHTML="";

 lista.forEach((t,i)=>{
  let tr=document.createElement("tr");
  if(i<4) tr.classList.add("top");

  tr.innerHTML=`
  <td>${i+1}</td>
  <td>${t.time}</td>
  <td>${t.pts}</td>
  <td>${t.j}</td>
  <td>${t.v}</td>
  <td>${t.e}</td>
  <td>${t.d}</td>
  <td>${t.gp}</td>
  <td>${t.sg}</td>`;

  tbody.appendChild(tr);
 });

 window.classificados=lista.slice(0,4);
}

/* 🔥 CHAVE BONITA */
function finalizarLiga(){
 if(!window.classificados || window.classificados.length<4){
  alert("Precisa de pelo menos 4 times");
  return;
 }

 let m=document.getElementById("mata");
 let a=window.classificados;

 m.innerHTML=`
 <div class="chave">

   <div class="coluna">
     <h3>Semifinais</h3>
     <div class="duelo">${criarDuelo(a[0].time,a[3].time,"semi1")}</div>
     <div class="duelo">${criarDuelo(a[1].time,a[2].time,"semi2")}</div>
   </div>

   <div class="coluna final">
     <h3>Final</h3>
     <div id="finalArea"></div>
     <h2 id="campeao"></h2>
   </div>

 </div>
 `;
}

/* ✅ CORRIGIDO */
function calcularSemis(){
 let vencedores=[];

 ["semi1","semi2"].forEach(id=>{
  let jogos=document.querySelectorAll(`[data-duelo='${id}']`);
  if(jogos.length<2) return;

  let t1=jogos[0].children[0].innerText;
  let t2=jogos[0].children[2].innerText;

  let total1=0,total2=0,ok=0;

  jogos.forEach(j=>{
    let casa=j.children[0].innerText;
    let g1=parseInt(j.children[1].children[0].value);
    let g2=parseInt(j.children[1].children[2].value);

    if(isNaN(g1)||isNaN(g2)) return;

    ok++;

    if(casa===t1){ total1+=g1; total2+=g2; }
    else{ total1+=g2; total2+=g1; }
  });

  if(ok===2){
    if(total1>total2) vencedores.push(t1);
    else if(total2>total1) vencedores.push(t2);
  }
 });

 if(vencedores.length===2){
  document.getElementById("finalArea").innerHTML=
  `<div class="duelo">${criarDuelo(vencedores[0],vencedores[1],"final",true)}</div>`;
 }
}

function verCampeao() {
  let jogos = document.querySelectorAll("[data-duelo='final']");
  let t1 = jogos[0].querySelector('.time:first-child').innerText;
  let t2 = jogos[0].querySelector('.time:last-child').innerText;
  let g1 = 0, g2 = 0;

  jogos.forEach(j => {
    let inputs = j.querySelectorAll('input');
    let a = parseInt(inputs[0].value), b = parseInt(inputs[1].value);
    if (!isNaN(a) && !isNaN(b)) {
      if (j.querySelector('.time:first-child').innerText === t1) { g1 += a; g2 += b; }
      else { g1 += b; g2 += a; }
    }
  });

  const c = document.getElementById("campeao");
  
  if (g1 === g2) {
    if (!document.getElementById("penaltis-box")) {
      alert("Final empatada! Decisão por pênaltis.");
      criarCampoPenaltis(t1, t2, "finalArea", "verCampeao()");
    } else {
      let p1 = parseInt(document.getElementById("pen-1").value);
      let p2 = parseInt(document.getElementById("pen-2").value);
      if (isNaN(p1) || isNaN(p2)) return alert("Preencha os pênaltis!");
      if (p1 === p2) return alert("Pênaltis empatados? Continue batendo!");
      
      c.innerHTML = `🏆 CAMPEÃO: ${p1 > p2 ? t1 : t2} (nos pênaltis)`;
      document.getElementById("btnVerCampeao").style.display = 'none';
      document.getElementById("penaltis-box").remove();
    }
  } else {
    c.innerHTML = `🏆 CAMPEÃO: ${g1 > g2 ? t1 : t2}`;
    document.getElementById("btnVerCampeao").style.display = 'none';
    if(document.getElementById("penaltis-box")) document.getElementById("penaltis-box").remove();
  }
}

function criarDuelo(t1, t2, id, final = false) {
  // Define qual função chamar ao digitar o placar
  const func = final ? "verCampeao()" : "void(0)"; 
  
  return `
  <p><b>Ida: ${t1} x ${t2}</b></p>
  <div class="jogo" data-duelo="${id}">
    <div class="time">${t1}</div>
    <div class="placar">
      <input type="number" oninput="${func}"> x
      <input type="number" oninput="${func}">
    </div>
    <div class="time">${t2}</div>
  </div>

  <p><b>Volta: ${t2} x ${t1}</b></p>
  <div class="jogo" data-duelo="${id}">
    <div class="time">${t2}</div>
    <div class="placar">
      <input type="number" oninput="${func}"> x
      <input type="number" oninput="${func}">
    </div>
    <div class="time">${t1}</div>
  </div>
  `;
}


function forcarFinal() {
  let vencedores = [];
  const IDs = ["semi1", "semi2"];

  for (let id of IDs) {
    let jogos = document.querySelectorAll(`[data-duelo='${id}']`);
    if (jogos.length < 2) return alert("Gere a liga primeiro!");

    let t1 = jogos[0].querySelector('.time:first-child').innerText;
    let t2 = jogos[0].querySelector('.time:last-child').innerText;
    let total1 = 0, total2 = 0, preenchidos = 0;

    jogos.forEach(j => {
      let inputs = j.querySelectorAll('input');
      let g1 = parseInt(inputs[0].value), g2 = parseInt(inputs[1].value);
      if (!isNaN(g1) && !isNaN(g2)) {
        preenchidos++;
        if (j.querySelector('.time:first-child').innerText === t1) { total1 += g1; total2 += g2; }
        else { total1 += g2; total2 += g1; }
      }
    });

    if (preenchidos < 2) return alert("Preencha todos os jogos das semis!");

    if (total1 === total2) {
      alert(`Empate em ${t1} x ${t2}! Resolva nos pênaltis.`);
      // Se já houver caixa de pênalti, não duplica
      if (!document.getElementById("penaltis-box")) {
        criarCampoPenaltis(t1, t2, "mata", "forcarFinal()"); 
      } else {
        let p1 = parseInt(document.getElementById("pen-1").value);
        let p2 = parseInt(document.getElementById("pen-2").value);
        if (isNaN(p1) || isNaN(p2)) return alert("Preencha os gols dos pênaltis!");
        if (p1 === p2) return alert("Os pênaltis não podem terminar empatados!");
        vencedores.push(p1 > p2 ? t1 : t2);
        document.getElementById("penaltis-box").remove();
      }
    } else {
      vencedores.push(total1 > total2 ? t1 : t2);
    }
  }

  if (vencedores.length === 2) {
    // Esconde o botão de finalizar semis
    event.target.style.display = 'none';
    
    // Cria a final
    document.getElementById("finalArea").innerHTML = `
      <div class="duelo">${criarDuelo(vencedores[0], vencedores[1], "final", true)}</div>
      <button id="btnVerCampeao" onclick="verCampeao()" style="background:#22c55e; margin-top:10px;">Ver Campeão</button>
    `;
  }
}
  
  
function criarCampoPenaltis(t1, t2, destinoId, callback) {
  const container = document.getElementById(destinoId);
  container.innerHTML += `
    <div id="penaltis-box" style="margin-top:10px; padding:10px; border:1px dashed #fbbf24; border-radius:10px; background: rgba(251, 191, 36, 0.1);">
      <p style="color:#fbbf24; font-weight:bold; margin:0 0 10px 0;">PÊNALTIS</p>
      <div class="placar">
        <span>${t1}</span>
        <input type="number" id="pen-1" placeholder="Gols" style="width:60px">
        <span>x</span>
        <input type="number" id="pen-2" placeholder="Gols" style="width:60px">
        <span>${t2}</span>
      </div>
      <button onclick="${callback}" style="background:#fbbf24; margin-top:10px;">Confirmar Pênaltis</button>
    </div>
  `;
}
  

</script></body></html>
