<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Quintals League</title><style>

body { font-family: Arial; background:#0b0f2a; color:white; margin:0; }

header { background: linear-gradient(135deg,#0f172a,#1e3a8a); text-align:center; padding:20px 10px; }

header h1 { margin:0; font-size:26px; letter-spacing:2px; background: linear-gradient(90deg,#3b82f6,#22c55e); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

header img { width:120px; margin-top:10px; border-radius:10px; }

.container { padding:10px; }

input, button { width:100%; padding:14px; margin:6px 0; border-radius:10px; border:none; }
button { background:#2563eb; color:white; font-weight:bold; }

/* tabela */
table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { padding:8px; border-top:1px solid #1f2937; }
th { color:#9ca3af; }
tr { background:#111827; }
.top { border-left:4px solid #3b82f6; }

/* jogos */
.jogo {
display:grid;
grid-template-columns: 1fr auto 1fr;
align-items:center;
background:#1e293b;
padding:10px;
margin:6px 0;
border-radius:10px;
gap:8px;
}
.time { text-align:center; font-size:13px; }
.placar { display:flex; gap:5px; align-items:center; }
.placar input { width:40px; height:35px; text-align:center; }

/* 🔥 CHAVE ESTILO CHAMPIONS */
.chave {
  display:flex;
  justify-content:space-between;
  margin-top:20px;
  gap:20px;
}

.coluna {
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.coluna h3 {
  text-align:center;
  color:#9ca3af;
}

.duelo {
  background:#0f172a;
  padding:12px;
  border-radius:14px;
  margin-bottom:20px;
  box-shadow:0 0 15px rgba(0,0,0,0.6);
  border:1px solid #1e3a8a;
}

.final {
  align-items:center;
}

/* Bolinhas de Pênaltis */
.btn-penalti { cursor:pointer; font-size:22px; margin:0 2px; }

</style></head><body>

<header>
<h1>🏆 UEFA QUINTALS LEAGUE</h1>
<img src="Champions-League-com-novo-formato-comeca-hoje.-Confira-os-jogos.jpg">
</header>

<div class="container">

<input id="novoTime" placeholder="Digite um time">
<button onclick="adicionarTime()">Adicionar Time</button>
<button onclick="finalizarLiga()">Finalizar Liga</button>

<table id="tabela">
<thead>
<tr>
<th>Pos</th><th>Time</th><th>P</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>SG</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2>Jogos</h2>
<div id="jogos"></div>

<h2>Mata-mata</h2>
<div id="mata"></div>
  
<button id="btnForcarSemis" onclick="forcarFinal()" style="margin-top:10px; background:#22c55e;">
Finalizar Semifinais
</button>

</div>

<script>

let times = JSON.parse(localStorage.getItem('times_league')) || [];
let tabela = JSON.parse(localStorage.getItem('tabela_league')) || {};
window.winner_semi1 = null;
window.winner_semi2 = null;

window.onload = () => { if(times.length > 0) { atualizar(); gerarJogos(); } };

function salvar() {
    localStorage.setItem('times_league', JSON.stringify(times));
    localStorage.setItem('tabela_league', JSON.stringify(tabela));
}

document.getElementById("novoTime").addEventListener("keypress", e=>{
 if(e.key==="Enter") adicionarTime();
});

function adicionarTime(){
 let nome=document.getElementById("novoTime").value.trim();
 if(!nome || times.includes(nome)) return;
 times.push(nome);
 tabela[nome]={pts:0,v:0,e:0,d:0,gp:0,gc:0,j:0};
 document.getElementById("novoTime").value="";
 gerarJogos();
 atualizar();
 salvar();
}

function gerarJogos(){
 let div=document.getElementById("jogos");
 div.innerHTML="";
 if(times.length<2) return;
 let lista=[...times];
 if(lista.length%2) lista.push("BYE");
 let n=lista.length;
 let arr=lista.slice();
 for(let r=0;r<n-1;r++){
  div.innerHTML+=`<h3 style="color:#9ca3af">Rodada ${r+1}</h3>`;
  for(let i=0;i<n/2;i++){
   let t1=arr[i]; let t2=arr[n-1-i];
   if(t1!=="BYE" && t2!=="BYE"){
    div.innerHTML+=`<div class="jogo"><div class="time">${t1}</div><div class="placar"><input type="number" min="0" oninput="atualizar()"><span>x</span><input type="number" min="0" oninput="atualizar()"></div><div class="time">${t2}</div></div>`;
   }
  }
  arr.splice(1,0,arr.pop());
 }
}

function atualizar(){
 for(let t of times) tabela[t]={pts:0,v:0,e:0,d:0,gp:0,gc:0,j:0};
 document.querySelectorAll('#jogos .jogo').forEach(j=>{
  let t1=j.children[0].innerText; let t2=j.children[2].innerText;
  let g1=parseInt(j.children[1].children[0].value); let g2=parseInt(j.children[1].children[2].value);
  if(isNaN(g1)||isNaN(g2)) return;
  tabela[t1].gp+=g1; tabela[t1].gc+=g2; tabela[t2].gp+=g2; tabela[t2].gc+=g1; tabela[t1].j++; tabela[t2].j++;
  if(g1>g2){ tabela[t1].pts+=3; tabela[t1].v++; tabela[t2].d++; }
  else if(g2>g1){ tabela[t2].pts+=3; tabela[t2].v++; tabela[t1].d++; }
  else{ tabela[t1].pts++; tabela[t2].pts++; tabela[t1].e++; tabela[t2].e++; }
 });
 let lista=Object.keys(tabela).map(t=>({time:t, ...tabela[t], sg:tabela[t].gp-tabela[t].gc}));
 lista.sort((a,b)=>b.pts-a.pts||b.sg-a.sg||b.gp-a.gp);
 let tbody=document.querySelector("#tabela tbody"); tbody.innerHTML="";
 lista.forEach((t,i)=>{
  let tr=document.createElement("tr"); if(i<4) tr.classList.add("top");
  tr.innerHTML=`<td>${i+1}</td><td>${t.time}</td><td>${t.pts}</td><td>${t.j}</td><td>${t.v}</td><td>${t.e}</td><td>${t.d}</td><td>${t.gp}</td><td>${t.sg}</td>`;
  tbody.appendChild(tr);
 });
 window.classificados=lista.slice(0,4);
 salvar();
}

function finalizarLiga(){
 if(!window.classificados || window.classificados.length<4) return alert("Precisa de 4 times");
 let m=document.getElementById("mata"); let a=window.classificados;
 m.innerHTML=`
 <div class="chave">
   <div class="coluna">
     <h3>Semifinais</h3>
     <div class="duelo">${criarDuelo(a[0].time,a[3].time,"semi1")}</div>
     <div class="duelo">${criarDuelo(a[1].time,a[2].time,"semi2")}</div>
   </div>
   <div class="coluna final">
     <h3>Final</h3>
     <div id="finalArea"></div>
     <h2 id="campeao" style="text-align:center"></h2>
   </div>
 </div>`;
}

function criarDuelo(t1, t2, id) {
  return `
  <p><b>Ida: ${t1} x ${t2}</b></p>
  <div class="jogo" data-duelo="${id}">
    <div class="time">${t1}</div>
    <div class="placar"><input type="number"> x <input type="number"></div>
    <div class="time">${t2}</div>
  </div>
  <p><b>Volta: ${t2} x ${t1}</b></p>
  <div class="jogo" data-duelo="${id}">
    <div class="time">${t2}</div>
    <div class="placar"><input type="number"> x <input type="number"></div>
    <div class="time">${t1}</div>
  </div>
  <div id="pen-container-${id}"></div>`;
}

function forcarFinal() {
  let vencedores = [];
  const IDs = ["semi1", "semi2"];

  for (let id of IDs) {
    let jogos = document.querySelectorAll(`[data-duelo='${id}']`);
    let t1 = jogos[0].children[0].innerText;
    let t2 = jogos[0].children[2].innerText;
    let tot1 = 0, tot2 = 0, ok = 0;

    jogos.forEach(j => {
      let g1 = parseInt(j.querySelector('input:first-child').value);
      let g2 = parseInt(j.querySelector('input:last-child').value);
      if (!isNaN(g1) && !isNaN(g2)) {
        ok++;
        if (j.children[0].innerText === t1) { tot1 += g1; tot2 += g2; }
        else { tot1 += g2; tot2 += g1; }
      }
    });

    if (ok < 2) return alert("Preencha todos os placares das Semis!");

    if (tot1 === tot2) {
        if (!window["winner_" + id]) {
            exibirPenaltis(t1, t2, id);
            return alert("Empate! Resolva nos pênaltis abaixo.");
        }
        vencedores.push(window["winner_" + id]);
    } else {
        vencedores.push(tot1 > tot2 ? t1 : t2);
    }
  }

  if (vencedores.length === 2) {
    document.getElementById("btnForcarSemis").style.display = "none";
    document.getElementById("finalArea").innerHTML = `
      <div class="duelo">${criarDuelo(vencedores[0], vencedores[1], "final")}</div>
      <button id="btnVerCampeao" onclick="verCampeao()" style="background:#22c55e">Ver Campeão</button>
    `;
  }
}

function exibirPenaltis(t1, t2, id) {
    let cont = document.getElementById("pen-container-" + id);
    if (cont.innerHTML !== "") return;
    cont.innerHTML = `
    <div style="border:1px dashed #fbbf24; padding:10px; border-radius:10px; margin-top:5px; text-align:center">
        <small style="color:#fbbf24">PÊNALTIS (3 iniciais)</small>
        <div style="display:flex; justify-content:space-around; margin-top:5px">
            <div id="p-t1-${id}"><b>${t1}:</b></div>
            <div id="p-t2-${id}"><b>${t2}:</b></div>
        </div>
        <button onclick="confirmarPen('${t1}','${t2}','${id}')" style="background:#fbbf24; font-size:11px; padding:5px; margin-top:5px">Confirmar Vencedor</button>
    </div>`;
    for(let i=0; i<3; i++) { addBol(id, 1); addBol(id, 2); }
}

function addBol(id, timeNum) {
    let span = document.createElement("span");
    span.className = "btn-penalti"; span.innerHTML = "⚪"; span.dataset.val = "0";
    span.onclick = function() {
        if(this.dataset.val=="0"){ this.innerHTML="🟢"; this.dataset.val="1"; }
        else if(this.dataset.val=="1"){ this.innerHTML="🔴"; this.dataset.val="2"; }
        else { this.innerHTML="⚪"; this.dataset.val="0"; }
    };
    document.getElementById(`p-t${timeNum}-${id}`).appendChild(span);
}

function confirmarPen(t1, t2, id) {
    let g1 = document.getElementById(`p-t1-${id}`).querySelectorAll('[data-val="1"]').length;
    let g2 = document.getElementById(`p-t2-${id}`).querySelectorAll('[data-val="1"]').length;
    if(g1 === g2) return alert("Pênaltis empatados!");
    window["winner_" + id] = g1 > g2 ? t1 : t2;
    alert("Vencedor: " + window["winner_" + id] + ". Agora clique em Finalizar Semifinais novamente.");
}

function verCampeao() {
    let jogos = document.querySelectorAll("[data-duelo='final']");
    let t1 = jogos[0].children[0].innerText;
    let t2 = jogos[0].children[2].innerText;
    let g1 = 0, g2 = 0, ok = 0;

    jogos.forEach(j => {
        let v1 = parseInt(j.querySelector('input:first-child').value);
        let v2 = parseInt(j.querySelector('input:last-child').value);
        if(!isNaN(v1) && !isNaN(v2)) {
            ok++;
            if(j.children[0].innerText === t1) { g1 += v1; g2 += v2; }
            else { g1 += v2; g2 += v1; }
        }
    });

    if(ok < 2) return alert("Preencha a final!");

    if(g1 === g2) {
        if(!window.winner_final) {
            exibirPenaltis(t1, t2, "final");
            return alert("Final empatada! Resolva nos pênaltis.");
        }
        document.getElementById("campeao").innerHTML = "🏆 CAMPEÃO: " + window.winner_final;
        document.getElementById("btnVerCampeao").style.display = "none";
    } else {
        document.getElementById("campeao").innerHTML = "🏆 CAMPEÃO: " + (g1 > g2 ? t1 : t2);
        document.getElementById("btnVerCampeao").style.display = "none";
    }
}

</script></body></html>
