<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabela Profissional</title>
<style>
body { font-family: Arial; background:#0b0f2a; color:white; margin:0; padding:10px; }h1 { text-align:center; font-size:28px; margin:15px 0 5px; font-weight:bold; letter-spacing:1px; background: linear-gradient(90deg, #3b82f6, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

input, button { width:95%; padding:10px; margin:5px auto; display:block; border-radius:8px; border:none; } button { background:#1e40af; color:white; }

/* TABELA */ table { width:100%; border-collapse:collapse; margin-top:10px; font-size:13px; } th { text-align:left; padding:10px 6px; color:#9ca3af; font-weight:normal; } td { padding:10px 6px; border-top:1px solid #1f2937; } tr { background:#111827; }

.top { border-left:4px solid #3b82f6; } .pos { width:25px; text-align:center; color:#9ca3af; } .time { font-weight:bold; } .num { text-align:center; }

/* JOGOS (ARRUMADO) */ .jogo { display:grid; grid-template-columns: 1fr auto 1fr; align-items:center; background:#1e293b; padding:10px; margin:6px 0; border-radius:10px; gap:8px; }

.timejogo { font-size:13px; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.placar { display:flex; align-items:center; gap:5px; }

.placar input { width:35px; height:35px; text-align:center; border-radius:6px; }

</style>
</head>
<body><h1>🏆 UEFA QUINTALS LEAGUE</h1>
<img src="Champions-League-com-novo-formato-comeca-hoje.-Confira-os-jogos.jpg" style="width:150px; display:block; margin:auto;"><input id="novoTime" placeholder="Digite um time">
<button onclick="adicionarTime()">Adicionar Time</button><table id="tabela">
<thead>
<tr>
<th>Pos</th>
<th>Clube</th>
<th class="num">Pts</th>
<th class="num">PJ</th>
<th class="num">V</th>
<th class="num">E</th>
<th class="num">D</th>
<th class="num">GM</th>
<th class="num">SG</th>
</tr>
</thead>
<tbody></tbody>
</table><div id="jogos"></div><script>
let times = [];
let tabela = {};

// ENTER DO CELULAR FUNCIONANDO
document.getElementById("novoTime").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    adicionarTime();
  }
});

function adicionarTime() {
  let nome = document.getElementById("novoTime").value.trim();
  if (!nome) return;

  times.push(nome);
  tabela[nome] = {pts:0,v:0,e:0,d:0,gp:0,gc:0,j:0};

  document.getElementById("novoTime").value="";

  gerarJogos();
  atualizar();
}

function gerarJogos() {
  let div = document.getElementById("jogos");
  div.innerHTML = "";

  if (times.length < 2) return;

  // Método do círculo (round-robin) para evitar sequência repetida
  let lista = [...times];
  let isImpar = lista.length % 2 !== 0;
  if (isImpar) lista.push("BYE");

  const n = lista.length;
  const rodadas = n - 1;
  let arr = lista.slice();

  for (let r = 0; r < rodadas; r++) {
    div.innerHTML += `<h3 style="text-align:left;margin:10px 5px;color:#9ca3af;">Rodada ${r+1}</h3>`;

    for (let i = 0; i < n / 2; i++) {
      const t1 = arr[i];
      const t2 = arr[n - 1 - i];

      if (t1 !== "BYE" && t2 !== "BYE") {
        // ids baseados na rodada para não conflitar
        const id1 = `g_${r}_${i}_1`;
        const id2 = `g_${r}_${i}_2`;

        div.innerHTML += `
        <div class="jogo">
          <div class="timejogo">${t1}</div>
          <div class="placar">
            <input type="number" min="0" oninput="atualizar()" id="${id1}">
            <span>x</span>
            <input type="number" min="0" oninput="atualizar()" id="${id2}">
          </div>
          <div class="timejogo">${t2}</div>
        </div>`;
      }
    }

    // rotação (fixa o primeiro)
    arr.splice(1, 0, arr.pop());
  }
}</div>
        <div class="placar">
          <input type="number" min="0" oninput="atualizar()" id="g_${i}_${j}_1">
          <span>x</span>
          <input type="number" min="0" oninput="atualizar()" id="g_${i}_${j}_2">
        </div>
        <div class="timejogo">${times[j]}</div>
      </div>`;
    }
  }
}

function atualizar(){
  for(let t of times){
    tabela[t]={pts:0,v:0,e:0,d:0,gp:0,gc:0,j:0};
  }

  for (let i=0;i<times.length;i++){
    for (let j=i+1;j<times.length;j++){
      let g1=parseInt(document.getElementById(`g_${i}_${j}_1`)?.value);
      let g2=parseInt(document.getElementById(`g_${i}_${j}_2`)?.value);

      if(isNaN(g1)||isNaN(g2)) continue;

      let t1=times[i];
      let t2=times[j];

      tabela[t1].gp+=g1; tabela[t1].gc+=g2;
      tabela[t2].gp+=g2; tabela[t2].gc+=g1;

      tabela[t1].j++; tabela[t2].j++;

      if(g1>g2){
        tabela[t1].pts+=3; tabela[t1].v++; tabela[t2].d++;
      }else if(g2>g1){
        tabela[t2].pts+=3; tabela[t2].v++; tabela[t1].d++;
      }else{
        tabela[t1].pts+=1; tabela[t2].pts+=1;
        tabela[t1].e++; tabela[t2].e++;
      }
    }
  }

  let lista=Object.keys(tabela).map(t=>({
    time:t,
    ...tabela[t],
    sg:tabela[t].gp-tabela[t].gc
  }));

  lista.sort((a,b)=>b.pts-a.pts||b.sg-a.sg||b.gp-a.gp);

  let tbody=document.querySelector("#tabela tbody");
  tbody.innerHTML="";

  lista.forEach((t,i)=>{
    let tr=document.createElement("tr");
    if(i<4) tr.classList.add("top");

    tr.innerHTML=`
      <td class="pos">${i+1}</td>
      <td class="time">${t.time}</td>
      <td class="num">${t.pts}</td>
      <td class="num">${t.j}</td>
      <td class="num">${t.v}</td>
      <td class="num">${t.e}</td>
      <td class="num">${t.d}</td>
      <td class="num">${t.gp}</td>
      <td class="num">${t.sg}</td>
    `;

    tbody.appendChild(tr);
  });
}
</script></body>
</html>
