<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quintals League</title>
<style>
body { font-family: Arial; background:#0b0f2a; color:white; margin:0; }header { background: linear-gradient(135deg,#0f172a,#1e3a8a); text-align:center; padding:20px 10px; }

header h1 { margin:0; font-size:26px; letter-spacing:2px; background: linear-gradient(90deg,#3b82f6,#22c55e); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

header img { width:120px; margin-top:10px; border-radius:10px; }

.container { padding:10px; }

input, button { width:100%; padding:14px; margin:6px 0; border-radius:10px; border:none; }

button { background:#2563eb; color:white; font-weight:bold; }

/* tabela */ table { width:100%; border-collapse:collapse; margin-top:10px; } th, td { padding:8px; border-top:1px solid #1f2937; } th { color:#9ca3af; } tr { background:#111827; }

.top { border-left:4px solid #3b82f6; } .num { text-align:center; }

/* jogos */ .jogo { display:grid; grid-template-columns:1fr auto 1fr; background:#1e293b; padding:10px; margin:6px 0; border-radius:10px; } .placar input { width:35px; text-align:center; }

</style>
</head>
<body><header>
  <h1>🏆 UEFA QUINTALS LEAGUE</h1>
  <img src="Champions-League-com-novo-formato-comeca-hoje.-Confira-os-jogos.jpg">
</header><div class="container"><input id="novoTime" placeholder="Digite um time">
<button onclick="adicionarTime()">Adicionar Time</button>
<button onclick="finalizarLiga()">Finalizar Liga</button><table id="tabela">
<thead>
<tr>
<th>Pos</th><th>Time</th><th>P</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>SG</th>
</tr>
</thead>
<tbody></tbody>
</table><h2>Jogos</h2>
<div id="jogos"></div><h2>Mata-mata</h2>
<div id="mata"></div></div><script>
let times=[];
let tabela={};

function adicionarTime(){
 let nome=document.getElementById("novoTime").value.trim();
 if(!nome) return;

 times.push(nome);
 tabela[nome]={pts:0,v:0,e:0,d:0,gp:0,gc:0,j:0};
 document.getElementById("novoTime").value="";
 gerarJogos();
 atualizar();
}

function gerarJogos(){
 let div=document.getElementById("jogos");
 div.innerHTML="";
 if(times.length<2) return;

 let lista=[...times];
 if(lista.length%2) lista.push("BYE");
 let n=lista.length;
 let arr=lista.slice();

 for(let r=0;r<n-1;r++){
  div.innerHTML+=`<h3>Rodada ${r+1}</h3>`;
  for(let i=0;i<n/2;i++){
   let t1=arr[i], t2=arr[n-1-i];
   if(t1!="BYE"&&t2!="BYE"){
    div.innerHTML+=`<div class="jogo">
    <div>${t1}</div>
    <div class="placar">
    <input type="number" oninput="atualizar()"> x
    <input type="number" oninput="atualizar()">
    </div>
    <div>${t2}</div>
    </div>`;
   }
  }
  arr.splice(1,0,arr.pop());
 }
}

function atualizar(){
 for(let t of times){
  tabela[t]={pts:0,v:0,e:0,d:0,gp:0,gc:0,j:0};
 }

 document.querySelectorAll('.jogo').forEach(j=>{
  let t1=j.children[0].innerText;
  let t2=j.children[2].innerText;
  let g1=parseInt(j.children[1].children[0].value);
  let g2=parseInt(j.children[1].children[2].value);
  if(isNaN(g1)||isNaN(g2)) return;

  tabela[t1].gp+=g1; tabela[t1].gc+=g2;
  tabela[t2].gp+=g2; tabela[t2].gc+=g1;
  tabela[t1].j++; tabela[t2].j++;

  if(g1>g2){tabela[t1].pts+=3; tabela[t1].v++; tabela[t2].d++;}
  else if(g2>g1){tabela[t2].pts+=3; tabela[t2].v++; tabela[t1].d++;}
  else{tabela[t1].pts++; tabela[t2].pts++; tabela[t1].e++; tabela[t2].e++;}
 });

 let lista=Object.keys(tabela).map(t=>({time:t,...tabela[t],sg:tabela[t].gp-tabela[t].gc}));
 lista.sort((a,b)=>b.pts-a.pts||b.sg-a.sg||b.gp-a.gp);

 let tbody=document.querySelector("#tabela tbody"); tbody.innerHTML="";
 lista.forEach((t,i)=>{
  let tr=document.createElement("tr");
  if(i<4) tr.classList.add("top");
  tr.innerHTML=`<td>${i+1}</td><td>${t.time}</td><td>${t.pts}</td><td>${t.j}</td><td>${t.v}</td><td>${t.e}</td><td>${t.d}</td><td>${t.gp}</td><td>${t.sg}</td>`;
  tbody.appendChild(tr);
 });

 window.classificados=lista.slice(0,4);
}

function finalizarLiga(){
 if(!window.classificados || window.classificados.length<4) return alert("Precisa de 4 times");
 let m=document.getElementById("mata");
 m.innerHTML="<h3>Semifinais</h3>";

 let a=classificados;
 m.innerHTML+=criarDuelo(a[0].time,a[3].time);
 m.innerHTML+=criarDuelo(a[1].time,a[2].time);

 m.innerHTML+="<h3>Final</h3>";
 m.innerHTML+=`<div class="jogo"><div>Vencedor 1</div><div class="placar"><input> x <input></div><div>Vencedor 2</div></div>`;
}

function criarDuelo(t1,t2){
 return `
 <div><b>${t1} x ${t2}</b> (Ida)</div>
 <div class="jogo"><div>${t1}</div><div class="placar"><input> x <input></div><div>${t2}</div></div>
 <div><b>${t2} x ${t1}</b> (Volta)</div>
 <div class="jogo"><div>${t2}</div><div class="placar"><input> x <input></div><div>${t1}</div></div>
 `;
}

</script></body>
</html>
